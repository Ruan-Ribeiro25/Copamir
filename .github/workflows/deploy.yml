name: Deploy VidaPlus no ThinkPad

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # A MÁGICA É AQUI: 'self-hosted' manda rodar dentro do seu PC
    runs-on: self-hosted

    steps:
    - name: Baixando código mais recente
      uses: actions/checkout@v3

    - name: Derrubando containers antigos
      # O comando '|| true' serve para não dar erro se o container não existir
      run: sudo docker compose down || true

    - name: Subindo nova versão (Rebuild)
      # O --build garante que ele pegue as mudanças do Java
      run: sudo docker compose up -d --build

    - name: Limpeza de imagens velhas
      run: sudo docker image prune -f